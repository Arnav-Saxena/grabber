<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>yt-dlp grabber</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0d0f;
    --surface:  #16161a;
    --border:   #2a2a30;
    --red:      #e5484d;
    --red-dim:  #7a1f22;
    --green:    #30a46c;
    --text:     #e8e8ec;
    --muted:    #6e6e7a;
    --mono:     'JetBrains Mono', monospace;
    --sans:     'Inter', sans-serif;
  }

  html { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100%; }

  body {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px 48px;
  }

  header {
    width: 100%; max-width: 680px;
    margin-bottom: 32px;
    display: flex; align-items: center; gap: 12px;
  }

  .logo {
    width: 36px; height: 36px;
    background: var(--red); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo svg { width: 20px; height: 20px; fill: #fff; }

  h1 { font-family: var(--mono); font-size: 1.15rem; font-weight: 700; }
  h1 span { color: var(--red); }

  .card {
    width: 100%; max-width: 680px;
    background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 0.72rem; font-family: var(--mono);
    color: var(--muted); letter-spacing: 0.08em;
    text-transform: uppercase; margin-bottom: 8px;
  }

  .url-row { display: flex; gap: 10px; align-items: stretch; }

  input[type="text"] {
    flex: 1; min-width: 0;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: var(--mono); font-size: 0.88rem;
    padding: 11px 14px; outline: none; transition: border-color .15s;
  }
  input[type="text"]:focus { border-color: var(--red); }
  input[type="text"]::placeholder { color: var(--muted); }

  .btn {
    background: var(--red); color: #fff; border: none; border-radius: 8px;
    font-family: var(--mono); font-size: 0.82rem; font-weight: 700;
    padding: 11px 18px; cursor: pointer; white-space: nowrap;
    transition: opacity .15s, transform .08s; letter-spacing: 0.02em;
  }
  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .btn-green { background: var(--green); }

  #meta { display: none; align-items: center; gap: 14px; margin-bottom: 20px; }
  #meta.show { display: flex; }
  #thumb { width: 88px; height: 56px; object-fit: cover; border-radius: 6px; flex-shrink: 0; background: var(--border); }
  .meta-title { font-size: 0.92rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
  .meta-sub { font-size: 0.75rem; color: var(--muted); font-family: var(--mono); }

  .tabs { display: flex; gap: 6px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
  .tab {
    background: none; border: none; color: var(--muted);
    font-family: var(--mono); font-size: 0.78rem; font-weight: 600;
    padding: 8px 14px; cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    letter-spacing: 0.04em; text-transform: uppercase;
    transition: color .15s, border-color .15s;
  }
  .tab.active { color: var(--red); border-bottom-color: var(--red); }
  .tab:hover:not(.active) { color: var(--text); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .fmt-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
  .fmt-item {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; cursor: pointer;
    transition: border-color .12s, background .12s;
    display: flex; align-items: center; gap: 8px;
  }
  .fmt-item:hover { border-color: var(--red); }
  .fmt-item.selected { border-color: var(--red); background: var(--red-dim); }
  .fmt-item input[type="radio"] { accent-color: var(--red); flex-shrink: 0; }
  .fmt-label { font-family: var(--mono); font-size: 0.8rem; }

  .sub-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .sub-item {
    background: var(--bg); border: 1px solid var(--border); border-radius: 20px;
    padding: 6px 14px; cursor: pointer;
    font-family: var(--mono); font-size: 0.78rem;
    transition: border-color .12s, background .12s;
  }
  .sub-item:hover { border-color: var(--red); }
  .sub-item.selected { border-color: var(--red); background: var(--red-dim); color: #fff; }

  .dl-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  .prog-bar-bg { background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; margin: 16px 0 10px; }
  #prog-fill { height: 100%; background: var(--red); border-radius: 4px; width: 0%; transition: width .3s; }
  #prog-fill.done { background: var(--green); }

  #prog-log {
    font-family: var(--mono); font-size: 0.72rem; color: var(--muted);
    max-height: 80px; overflow-y: auto; line-height: 1.6;
    padding: 8px; background: var(--bg);
    border-radius: 6px; border: 1px solid var(--border);
  }

  #done-msg {
    display: none; margin-top: 12px;
    background: #0e2a1e; border: 1px solid var(--green);
    border-radius: 8px; padding: 12px 16px;
    font-size: 0.85rem; color: var(--green); font-family: var(--mono);
  }
  #done-msg.show { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }

  #err-msg {
    display: none; margin-top: 12px;
    background: #2a0e0f; border: 1px solid var(--red);
    border-radius: 8px; padding: 12px 16px;
    font-size: 0.85rem; color: var(--red); font-family: var(--mono);
  }
  #err-msg.show { display: block; }

  .empty-msg { color: var(--muted); font-family: var(--mono); font-size: 0.8rem; padding: 16px 0; }

  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff;
    border-radius: 50%; animation: spin .6s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #progress-wrap { display: none; }
  #progress-wrap.show { display: block; }
  #dl-bar { display: none; }
  #dl-bar.show { display: block; }

  @media (max-width: 480px) {
    body { padding: 16px 12px 40px; }
    .url-row { flex-direction: column; }
    .btn { width: 100%; text-align: center; }
    .dl-actions { flex-direction: column; align-items: stretch; }
    .dl-actions .btn { text-align: center; }
    .fmt-list { grid-template-columns: 1fr 1fr; }
    #done-msg.show { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
    </svg>
  </div>
  <h1>yt-dlp <span>/</span> grabber</h1>
</header>

<div class="card">
  <label for="url-input">YouTube URL</label>
  <div class="url-row">
    <input type="text" id="url-input" placeholder="https://youtube.com/watch?v=..." autocomplete="off" />
    <button class="btn" id="fetch-btn" onclick="fetchInfo()">Fetch</button>
  </div>
</div>

<div class="card" id="formats-card" style="display:none">
  <div id="meta">
    <img id="thumb" src="" alt="" />
    <div class="meta-info" style="overflow:hidden">
      <div class="meta-title" id="vid-title">—</div>
      <div class="meta-sub" id="vid-sub">—</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('video',this)">Video</button>
    <button class="tab" onclick="switchTab('audio',this)">Audio</button>
    <button class="tab" onclick="switchTab('captions',this)">Captions</button>
  </div>

  <div id="tab-video" class="tab-panel active">
    <div class="fmt-list" id="video-list"><p class="empty-msg">No formats.</p></div>
  </div>
  <div id="tab-audio" class="tab-panel">
    <div class="fmt-list" id="audio-list"><p class="empty-msg">No formats.</p></div>
  </div>
  <div id="tab-captions" class="tab-panel">
    <div class="sub-list" id="sub-list"><p class="empty-msg">No captions.</p></div>
  </div>
</div>

<div class="card" id="dl-bar">
  <div class="dl-actions">
    <button class="btn" id="dl-btn" onclick="startDownload()">Download to device</button>
  </div>
  <div id="progress-wrap">
    <div class="prog-bar-bg"><div id="prog-fill"></div></div>
    <div id="prog-log"></div>
  </div>
  <div id="done-msg">
    <span id="done-text">✓ Ready</span>
    <a id="dl-link" href="#" class="btn btn-green" style="text-decoration:none;display:none">⬇ Save file</a>
  </div>
  <div id="err-msg"></div>
</div>

<script>
let videoFormats = [], audioFormats = [], subtitles = {};
let selectedVideo = null, selectedAudio = null, selectedSub = null;
let currentTab = 'video';
let ws = null;

const $ = id => document.getElementById(id);

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  $('tab-' + tab).classList.add('active');
  currentTab = tab;
}

async function fetchInfo() {
  const url = $('url-input').value.trim();
  if (!url) return;

  const btn = $('fetch-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Fetching…';
  $('formats-card').style.display = 'none';
  $('dl-bar').classList.remove('show');
  resetProgress();

  try {
    const res = await fetch('/info?url=' + encodeURIComponent(url));
    const data = await res.json();

    if (data.error) { showErr('Error: ' + data.error); return; }

    $('vid-title').textContent = data.title || 'Unknown';
    $('vid-sub').textContent = (data.uploader || '') + (data.duration ? ' · ' + data.duration : '');
    $('thumb').src = data.thumbnail || '';
    $('meta').classList.add('show');

    videoFormats = data.video_formats || [];
    audioFormats = data.audio_formats || [];
    subtitles = data.subtitles || {};

    selectedVideo = videoFormats[0]?.id || null;
    selectedAudio = null;
    selectedSub = null;

    renderVideoList();
    renderAudioList();
    renderSubList();

    $('formats-card').style.display = 'block';
    $('dl-bar').classList.add('show');
  } catch(e) {
    showErr('Network error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Fetch';
  }
}

function renderVideoList() {
  const el = $('video-list');
  if (!videoFormats.length) { el.innerHTML = '<p class="empty-msg">No video formats found.</p>'; return; }
  el.innerHTML = videoFormats.map((f, i) => `
    <label class="fmt-item ${i===0?'selected':''}" onclick="selectFmt('video','${f.id}',this)">
      <input type="radio" name="video" value="${f.id}" ${i===0?'checked':''} />
      <span class="fmt-label">${f.label}</span>
    </label>`).join('');
}

function renderAudioList() {
  const el = $('audio-list');
  if (!audioFormats.length) { el.innerHTML = '<p class="empty-msg">No audio-only formats found.</p>'; return; }
  el.innerHTML = audioFormats.map((f) => `
    <label class="fmt-item" onclick="selectFmt('audio','${f.id}',this)">
      <input type="radio" name="audio" value="${f.id}" />
      <span class="fmt-label">${f.label}</span>
    </label>`).join('');
}

function renderSubList() {
  const el = $('sub-list');
  const langs = Object.keys(subtitles);
  if (!langs.length) { el.innerHTML = '<p class="empty-msg">No captions available.</p>'; return; }
  el.innerHTML = langs.map(lang => `
    <div class="sub-item" onclick="selectSub('${lang}',this)">${lang}</div>`).join('');
}

function selectFmt(type, id, el) {
  const listId = type === 'video' ? 'video-list' : 'audio-list';
  document.querySelectorAll(`#${listId} .fmt-item`).forEach(i => i.classList.remove('selected'));
  el.classList.add('selected');
  if (type === 'video') selectedVideo = id;
  else selectedAudio = id;
}

function selectSub(lang, el) {
  document.querySelectorAll('#sub-list .sub-item').forEach(i => i.classList.remove('selected'));
  if (selectedSub === lang) { selectedSub = null; }
  else { el.classList.add('selected'); selectedSub = lang; }
}

function resetProgress() {
  $('progress-wrap').classList.remove('show');
  $('prog-fill').style.width = '0%';
  $('prog-fill').classList.remove('done');
  $('prog-log').textContent = '';
  $('done-msg').classList.remove('show');
  $('err-msg').classList.remove('show');
  $('dl-link').style.display = 'none';
}

function showErr(msg) {
  $('err-msg').textContent = '✗ ' + msg;
  $('err-msg').classList.add('show');
}

function startDownload() {
  const url = $('url-input').value.trim();
  if (!url) return;

  resetProgress();

  let payload = { url };
  if (currentTab === 'captions') {
    if (!selectedSub) { alert('Pick a caption language first.'); return; }
    payload.subtitle_only = true;
    payload.subtitle_lang = selectedSub;
  } else if (currentTab === 'audio') {
    if (!selectedAudio) { alert('Pick an audio format first.'); return; }
    payload.audio_only = true;
    payload.format_id = selectedAudio;
  } else {
    payload.format_id = selectedVideo;
  }

  if (ws) ws.close();

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/download`);

  const btn = $('dl-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Downloading…';
  $('progress-wrap').classList.add('show');

  ws.onopen = () => ws.send(JSON.stringify(payload));

  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    const log = $('prog-log');

    if (msg.type === 'progress') {
      $('prog-fill').style.width = msg.percent + '%';
      log.textContent = msg.line;
    } else if (msg.type === 'log') {
      log.textContent = msg.line;
    } else if (msg.type === 'done') {
      $('prog-fill').style.width = '100%';
      $('prog-fill').classList.add('done');
      const link = $('dl-link');
      link.href = `/download-file/${msg.file_id}`;
      link.download = msg.filename || 'download';
      link.style.display = 'inline-block';
      $('done-text').textContent = '✓ ' + (msg.filename || 'File ready');
      $('done-msg').classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Download to device';
      // auto-click download
      link.click();
    } else if (msg.type === 'error') {
      showErr(msg.message);
      btn.disabled = false;
      btn.textContent = 'Download to device';
    }
  };

  ws.onerror = () => {
    showErr('Connection error.');
    btn.disabled = false;
    btn.textContent = 'Download to device';
  };
}

$('url-input').addEventListener('keydown', e => { if (e.key === 'Enter') fetchInfo(); });
</script>
</body>
</html>
